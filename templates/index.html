{% extends "base.html" %}
{% block content %}

{% for film in films %}
<article class="film-card">
  <a class="film-cover" href="{{ '../' * depth }}f/{{ film.id }}/">
    <img src="{{ '../' * depth }}covers/{{ film.id }}/card.jpg"
         alt="{{ film | title_of }}" loading="lazy">
  </a>
  <div class="film-detail">
    <h2><a href="{{ '../' * depth }}f/{{ film.id }}/">{{ film | title_of }}</a></h2>
    <p class="film-meta">
      {{ film | date }}
      {% if film | runtime %}· {{ film | runtime }}{% endif %}
    </p>
    {% if film.description %}
    <p class="film-blurb">{{ film.description }}</p>
    {% endif %}
  </div>
</article>
{% else %}
<p class="empty">Nothing here yet.</p>
{% endfor %}

{% endblock %}
